<script>
  // hamburger
const hamburger= document.querySelector('.hamburger');
const nav= document.querySelector('.nav');
const closebtn =document.querySelector('.close-btn');
 hamburger.addEventListener("click", () =>{
    nav.classList.toggle('active');
 }
);
closebtn.addEventListener('click', () =>{
    nav.classList.remove('active');
})


// Buttons
const whatsappBtn = document.querySelector(".whatsapp-btn");
const emailBtn = document.querySelector(".email-btn");
const formBtn = document.querySelector(".form-btn");

// Get form fields
const nameInput = document.querySelector('input[name="name"]');
const mealInput = document.querySelector('input[name="meal"]');
const planInput = document.getElementById("plan");

// WhatsApp button (SMART)
whatsappBtn.addEventListener("click", function(){

  const name = nameInput.value || "Customer";
  const meal = mealInput.value || "a meal";
  const plan = planInput.value || "a plan";

  const message = `Hello FitMeal Uganda, my name is ${name}. I would like to order the ${plan} with ${meal}.`;

  window.open(
    `https://wa.me/256772845457?text=${encodeURIComponent(message)}`,
    "_blank"
  );
});


// Email button (also smart)
emailBtn.addEventListener("click", function(){

  const name = nameInput.value || "Customer";
  const meal = mealInput.value || "a meal";
  const plan = planInput.value || "a plan";

  const subject = "Order Request";
  const body = `Hello FitMeal Uganda,%0D%0A%0D%0AMy name is ${name}. I would like to order the ${plan} with ${meal}.`;

  window.location.href = `mailto:nakiyingilindah24@gmail.com?subject=${subject}&body=${body}`;
});


// Scroll to form
formBtn.addEventListener("click", function() {
  const form = document.querySelector(".order-form");
  if (form) {
    form.scrollIntoView({ behavior: "smooth" });
  }
});


// Capture plan from URL
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

if(plan){
  document.getElementById("plan").value = plan + " Plan";
}


</script>
