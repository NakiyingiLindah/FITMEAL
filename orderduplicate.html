<script>
  // hamburger
const hamburger= document.querySelector('.hamburger');
const nav= document.querySelector('.nav');
const closebtn =document.querySelector('.close-btn');
 hamburger.addEventListener("click", () =>{
    nav.classList.toggle('active');
 }
);
closebtn.addEventListener('click', () =>{
    nav.classList.remove('active');
})

const whatsappBtn = document.querySelector(".whatsapp-btn");
const emailBtn = document.querySelector(".email-btn");
const formBtn = document.querySelector(".form-btn");


// WhatsApp button
whatsappBtn.addEventListener("click", function(){
window.open(
"https://wa.me/256772845457?text=Hello%20FitMeal%20Uganda,%20I%20would%20like%20to%20make%20an%20order.",
"_blank"
);
});


// Email button
emailBtn.addEventListener("click", function(){
window.location.href =
"mailto:nakiyingilindah24@gmail.com?subject=Order%20Request&body=Hello%20FitMealUganda,%20I%20would%20like%20to%20make%20an%20order.";
});


// Form button

formBtn.addEventListener("click", function() {
  const form = document.querySelector(".order-form"); // select the section
  if (form) {
    form.scrollIntoView({ behavior: "smooth" }); // smooth scroll to form
  }
});

// javascript to capture the meal plan
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

if(plan){
  document.getElementById("plan").value = plan + " Plan";
}

</script>
